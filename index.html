<!DOCTYPE html>
<html>
    <title>one peag</title>
    
<head>


    <style>
h1 {
  font-size: 40px;
  animation: textAnimation 5s ease-in-out infinite alternate;
   color: yellow;
}


@keyframes textAnimation {
  from {
    opacity: 5;
    transform: translateY(-30px);
  }
  to {
    opacity: 5;
    transform: translateY(3px);
  }
}

video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 80%;
  object-fit: cover;
}


.content {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-40%, -40%);
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  background: rgba(110, 105, 105, 0.5);
  padding: 20px;
  border-radius: 20px;
}

</style>
</head>

<body>
<video autoplay muted loop>
  <source src="30fps(1).mp4" type="video/mp4">
</video>

<div class="content">
  <h1>Welcome to Ardh Sainik Canteen</h1>
</div>

</body>
</html>
