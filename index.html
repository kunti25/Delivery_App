<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Page</title>

    <style>
        body {
            margin: 0;
        }

        /* Heading */
        h1 {
            font-size: 40px;
            animation: textAnimation 2s ease-in-out infinite alternate;
            color: yellow;
        }

        @keyframes textAnimation {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(5px);
            }
        }

        /* Video Background */
        video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        /* Content Box */
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 20px;
            color: white;
        }
    </style>
</head>

<body>

<video autoplay muted loop>
    <source src="30fps(1).mp4" type="video/mp4">
</video>

<div class="content">
    <h1>Welcome to Ardh Sainik Canteen</h1>
</div>

</body>
</html>
