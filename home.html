<!DOCTYPE html>
<html>

<head>
    <title>Home</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f1f3f6;
        }

        /* HEADER */
        header {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            background: white;
            justify-content: space-between;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #f5c84c;
        }

        .search {
            width: 50%;
            padding: 12px;
            border-radius: 25px;
            border: none;
            background: #f1f3f6;
        }

        .right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .cart {
            background: green;
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
        }

        /* BANNER */
        .banner {
            margin: 20px;
            padding: 40px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to right, #2e7d32, #66bb6a);
            color: white;
        }

        .banner h1 {
            font-size: 35px;
        }

        .banner img {
            width: 300px;
        }

        .banner button {
            padding: 10px 20px;
            border: none;
            background: white;
            color: green;
            border-radius: 8px;
            margin-top: 10px;
        }

        /* SMALL CARDS */
        .cards {
            display: flex;
            gap: 20px;
            padding: 0 20px;
        }

        .card {
            flex: 1;
            border-radius: 15px;
            padding: 20px;
            color: white;
        }

        .c1 {
            background: #00acc1;
        }

        .c2 {
            background: #ffca28;
            color: black;
        }

        .c3 {
            background: #90a4ae;
        }

        /* CATEGORY GRID */
        .categories {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .item {
            background: white;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .item img {
            width: 60px;
            height: 60px;
        }

        .item p {
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">blinkit</div>

        <input class="search" placeholder="Search 'paneer'">

        <div class="right">
            <span>Login</span>
            <div class="cart">🛒 1 item ₹59</div>
        </div>
    </header>

    <!-- BANNER -->
    <div class="banner">
        <div>
            <h1>Stock up on daily essentials</h1>
            <p>Get farm-fresh goodness & more</p>
            <button>Shop Now</button>
        </div>

        <img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png">
    </div>

    <!-- CARDS -->
    <div class="cards">
        <div class="card c1">
            <h3>Pharmacy at your doorstep!</h3>
            <p>Order Now</p>
        </div>

        <div class="card c2">
            <h3>Pet care supplies</h3>
            <p>Order Now</p>
        </div>

        <div class="card c3">
            <h3>No time for a diaper run?</h3>
            <p>Order Now</p>
        </div>
    </div>

    <!-- CATEGORIES -->
    <div class="categories">

        <div class="item"><img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png">
            <p>Fruits</p>
        </div>
        <div class="item"><img src="https://cdn-icons-png.flaticon.com/512/2153/2153788.png">
            <p>Vegetables</p>
        </div>
        <div class="item"><img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png">
            <p>Snacks</p>
        </div>
        <div class="item"><img src="https://cdn-icons-png.flaticon.com/512/2935/2935394.png">
            <p>Drinks</p>
        </div>
        <div class="item"><img src="https://cdn-icons-png.flaticon.com/512/3076/3076129.png">
            <p>Bakery</p>
        </div>
        <div class="item"><img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png">
            <p>Milk</p>
        </div>
        <div class="item"><img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png">
            <p>Rice</p>
        </div>
        <div class="item"><img src="https://cdn-icons-png.flaticon.com/512/2153/2153788.png">
            <p>Oil</p>
        </div>
        <div class="item"><img src="https://cdn-icons-png.flaticon.com/512/2935/2935394.png">
            <p>Juice</p>
        </div>
        <div class="item"><img src="https://cdn-icons-png.flaticon.com/512/3076/3076129.png">
            <p>Biscuits</p>
        </div>

    </div>

</body>

</html>
