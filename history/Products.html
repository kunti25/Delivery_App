<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Mart | Big Display</title>
    <link rel="stylesheet" href="Products.css">
</head>
<body>

<div class="top-total-bar">
    <div class="container header-flex">
        <h1>Quick Mart</h1>
        <div class="total-display" onclick="toggleModal(true)">
            Cart Total: <span>₹<span id="top-amount">0</span></span>
        </div>
    </div>
</div>

<div class="container main-content">
    <div id="category-view">
        <h2 class="section-title">Shop by Category</h2>
        <div class="grid-3x2" id="category-list"></div>
    </div>

    <div id="product-view" class="hidden">
        <div class="view-header">
            <button class="back-btn" onclick="goBack()">← Back</button>
            <h2 id="category-title"></h2>
        </div>
        <div class="grid-3x2" id="product-list"></div>
    </div>
</div>

<div class="cart-bar hidden" id="cart-bar" onclick="toggleModal(true)">
    <div><span id="cart-count">0</span> Items Selected</div>
    <div class="view-cart-text">View Detailed Bill 🛒</div>
</div>

<div class="modal-overlay hidden" id="cart-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Final Bill</h3>
            <span class="close-modal" onclick="toggleModal(false)" style="font-size: 30px; cursor: pointer;">&times;</span>
        </div>
        
        <div id="cart-items-list"></div>

        <div class="modal-footer">
            <div class="total-row">
                <span>Grand Total</span>
                <span>₹<span id="modal-total">0</span></span>
            </div>
            <button class="checkout-btn" id="order-btn" onclick="handleOrder()">Order Now</button>
        </div>
    </div>
</div>

<div id="user-detail-modal" class="modal-overlay hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 2000;">
    <div class="modal-content" style="background: white; width: 90%; max-width: 400px; padding: 20px; border-radius: 15px; position: relative;">
        <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px;">
            <h3 style="margin: 0; color: #1c8d3b;">Delivery Information</h3>
            <span onclick="closeUserModal()" style="font-size: 30px; cursor: pointer; color: #666;">&times;</span>
        </div>
        
        <form onsubmit="finalizeOrder(event)">
            <div style="margin-bottom: 12px;">
                <label style="display: block; font-size: 14px; font-weight: bold; margin-bottom: 5px;">Full Name</label>
                <input type="text" id="u-name" placeholder="Enter your name" required style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box;">
            </div>
            <div style="margin-bottom: 12px;">
                <label style="display: block; font-size: 14px; font-weight: bold; margin-bottom: 5px;">Mobile Number</label>
                <input type="tel" id="u-phone" placeholder="10-digit number" pattern="[0-9]{10}" required style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box;">
            </div>
            <div style="margin-bottom: 12px;">
                <label style="display: block; font-size: 14px; font-weight: bold; margin-bottom: 5px;">Area / Locality</label>
                <input type="text" id="u-area" placeholder="e.g. Gandhi Nagar or Ward No." required style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box;">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-size: 14px; font-weight: bold; margin-bottom: 5px;">Full Address (House No, Landmark)</label>
                <textarea id="u-address" rows="3" placeholder="Detailed address for delivery boy" required style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-family: inherit;"></textarea>
            </div>
            
            <button type="submit" style="background: #1c8d3b; color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">Confirm & Place Order</button>
        </form>
    </div>
</div>

<script src="Products.js"></script>
</body>
</html>
